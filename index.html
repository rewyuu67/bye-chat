<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Goodbye Letter</title>
<style>
  body {
    background-color: black;
    color: white;
    font-family: 'Courier New', Courier, monospace;
    font-size: 28px; 
    line-height: 2; 
    padding: 50px;
    text-align: left;
    max-width: 800px;
    margin: auto;
  }

  .paragraph {
    margin-bottom: 50px;
    white-space: pre-wrap;
  }
</style>
</head>
<body>

<div id="container"></div>

<script>
const paragraphs = [
`This is my final goodbye to everyone that's on this website. If you managed to get here, it means you are somewhat connected to me from the past, or you're my friend. If you're reading this, yes, I don't play or want to go online anymore.`,

`I have a lot of dreams and plans that I am pursuing in my life, and I really want to make sure they happen. My life is already a mess, and I'd like to make sure that my future relatives have a better life than mine.`,

`The past five years have been the best years of my life. I've been on Discord & Instagram for a long time, and I'll also be selling my Roblox account: tokyohauntsher DM me on TikTok @rzrwy if you're interested. If you managed to read all this, I love you. You really are connected to me somehow.`,

`Even though, It is very unhealthy to be on your monitor 24/7, I really had a very fun year with everyone, I have met a lot of amazing people that that I would cherish their memories with. If I hurt you in the past and ghosted you, I'm very sorry. I wasn’t in the right mental state to make the best decisions. I hope you can forgive me for what I did.`,

`To everyone who knew about my past, I've really changed this past year. I didn’t like the person I was before, and I don’t want to go back to that.`,

`I have told the whole truth of what I wanted to say, I always lied to people and asked them to forgive me, Maybe if I had been open with everyone from the start and told the truth, Then I wouldn't have leave them this message as a failure of what I have become.`,

`I might have asked a lot of times to be forgiven but you really dont have to forgive me If i did something bad from you before. Just know that I have hated myself back then as I am writing this now.`,

`I just want to say thank you for being part of my life. Lately things have been really heavy for me, and I need some time to step back and take care of myself.`,

`Sorry everyone, There won't be next time, This is all of it of what I can say. I hope that all of you achieve what you really wanted to be in your life, Please don't go the same way that I went to. I would want you to forget about my existence as I really dont deserve anyone, I would always be unlovable in and out and that is fine with me.`,

`I'll be active on GitHub and TikTok ( just sometimes ). As for my IRL friends and family, I'll be pursuing my architecture career. Thank you again, and this is my final goodbye.`
];

const container = document.getElementById("container");

let paragraphIndex = 0;
let charIndex = 0;

// Create first paragraph immediately
const firstPara = document.createElement("div");
firstPara.className = "paragraph";
container.appendChild(firstPara);

function typeParagraph() {
  if (paragraphIndex < paragraphs.length) {
    let para = container.children[paragraphIndex];
    if (!para) {
      para = document.createElement("div");
      para.className = "paragraph";
      container.appendChild(para);
    }

    if (charIndex < paragraphs[paragraphIndex].length) {
      para.innerHTML += paragraphs[paragraphIndex][charIndex];
      charIndex++;
      setTimeout(typeParagraph, 20);
    } else {
      charIndex = 0;
      paragraphIndex++;
      setTimeout(typeParagraph, 300); // pause before next paragraph
    }
  }
}

// Start typing the first paragraph
typeParagraph();
</script>

</body>
</html>
